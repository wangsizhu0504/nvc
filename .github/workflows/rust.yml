name: CI

on:
  pull_request:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    name: "Quality Baseline"
    steps:
      - uses: hecrj/setup-rust-action@v1
        with:
          rust-version: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/checkout@v3
      - name: Run fast quality gate
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test

  real_download_smoke:
    runs-on: ubuntu-latest
    name: "Real Download Smoke"
    needs: quality
    steps:
      - uses: hecrj/setup-rust-action@v1
        with:
          rust-version: stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/checkout@v3
      - name: Run real-download smoke tests
        run: |
          cargo test --bin nvc remote_node_index::tests::test_list -- --ignored --exact --nocapture
          cargo test --test shared_global_prefix exec_uses_shared_prefix_and_global_packages_are_shared -- --ignored --exact --nocapture

  build_release_windows:
    runs-on: windows-latest
    name: "Release build for Windows"
    needs: [quality, real_download_smoke]
    steps:
      - uses: hecrj/setup-rust-action@v1
        with:
          rust-version: stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/checkout@v3
      - name: Build release binary
        run: cargo build --release
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
      - uses: actions/upload-artifact@v3
        with:
          name: nvc-windows
          path: target/release/nvc.exe

  build_release_macos:
    runs-on: macos-latest
    name: "Release build for macOS"
    needs: [quality, real_download_smoke]
    steps:
      - uses: hecrj/setup-rust-action@v1
        with:
          rust-version: stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/checkout@v3
      - name: Build release binary
        run: cargo build --release
        env:
          LZMA_API_STATIC: "true"
      - name: Strip binary from debug symbols
        run: strip target/release/nvc
      - name: List dynamically linked libraries
        run: otool -L target/release/nvc
      - uses: actions/upload-artifact@v3
        with:
          name: nvc-macos
          path: target/release/nvc

  build_release_linux:
    name: "Build static Linux binary"
    runs-on: ubuntu-latest
    needs: [quality, real_download_smoke]
    steps:
      - uses: hecrj/setup-rust-action@v1
        with:
          rust-version: stable
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          key: static-linux-binary
      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools
      - uses: actions/checkout@v3
      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Strip binary from debug symbols
        run: strip target/x86_64-unknown-linux-musl/release/nvc
      - uses: actions/upload-artifact@v3
        with:
          name: nvc-linux
          path: target/x86_64-unknown-linux-musl/release/nvc
