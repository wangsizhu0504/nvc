name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release, for example v0.2.0'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.tag }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${release_tag}" ]]; then
            echo "release tag is empty" >&2
            exit 1
          fi

          if ! git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null; then
            echo "tag ${release_tag} does not exist" >&2
            exit 1
          fi

          release_version="${release_tag#v}"
          manifest_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"

          if [[ "${manifest_version}" != "${release_version}" ]]; then
            echo "Cargo.toml version ${manifest_version} does not match release tag ${release_tag}" >&2
            exit 1
          fi

          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"

  quality:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare.outputs.release_tag }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run fast quality gate
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test
      - name: Run real-download smoke tests
        run: |
          cargo test --bin nvc remote_node_index::tests::test_list -- --ignored --exact --nocapture
          cargo test --test shared_global_prefix exec_uses_shared_prefix_and_global_packages_are_shared -- --ignored --exact --nocapture

  build_windows:
    runs-on: windows-latest
    needs: [prepare, quality]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare.outputs.release_tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release
        env:
          RUSTFLAGS: '-C target-feature=+crt-static'
      - name: Prepare release artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact="nvc-${{ needs.prepare.outputs.release_tag }}-x86_64-pc-windows-msvc.exe"
          cp target/release/nvc.exe "${artifact}"
          echo "artifact=${artifact}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: ${{ env.artifact }}

  build_macos:
    runs-on: macos-latest
    needs: [prepare, quality]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare.outputs.release_tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release
        env:
          LZMA_API_STATIC: 'true'
      - name: Strip binary
        run: strip target/release/nvc
      - name: Prepare release artifact
        shell: bash
        run: |
          set -euo pipefail
          arch="$(uname -m)"
          if [[ "${arch}" == "arm64" ]]; then
            target_arch="aarch64"
          else
            target_arch="x86_64"
          fi
          artifact="nvc-${{ needs.prepare.outputs.release_tag }}-${target_arch}-apple-darwin"
          cp target/release/nvc "${artifact}"
          echo "artifact=${artifact}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: ${{ env.artifact }}

  build_linux:
    runs-on: ubuntu-latest
    needs: [prepare, quality]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare.outputs.release_tag }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Ensure musl target is installed
        run: |
          rustup target add x86_64-unknown-linux-musl
          rustup target list --installed | grep x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          key: static-linux-binary
      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools
      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Strip binary
        run: strip target/x86_64-unknown-linux-musl/release/nvc
      - name: Prepare release artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact="nvc-${{ needs.prepare.outputs.release_tag }}-x86_64-unknown-linux-musl"
          cp target/x86_64-unknown-linux-musl/release/nvc "${artifact}"
          echo "artifact=${artifact}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: ${{ env.artifact }}

  publish:
    runs-on: ubuntu-latest
    needs: [prepare, build_windows, build_macos, build_linux]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare.outputs.release_tag }}
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find dist -maxdepth 2 -type f -exec cp {} release-assets/ \;
          ls -la release-assets
      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/generate-checksums.sh release-assets/* > release-assets/checksums.txt
          cat release-assets/checksums.txt
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          generate_release_notes: true
          files: |
            release-assets/*
